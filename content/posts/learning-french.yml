title: "Why I'm Learning French — and What Learning Teaches You"
date: 2025-10-01
summary: |
  I started learning French mostly out of practicality — I live in Ottawa, a bilingual city, and work for a federal government department where French opens doors. But the further I get into it, the more I realize the language itself is almost beside the point.

  Learning any language from scratch as an adult is humbling. You spend weeks just getting the sounds right. You have conversations where you understand every third word and have to hold the rest in a kind of mental fog. You get comfortable being confused. That discomfort is the point.

  I think a lot about the cognitive science behind language learning: comprehensible input, spaced repetition, the idea that output (speaking, writing) forces you to identify exactly what you don't know. These principles aren't unique to language — they map directly onto how I approach learning programming, judo, or anything else. The method matters more than the subject.

  There's also something about French specifically that rewards curiosity. The history of the language traces through Roman conquest, Norman invasion, the Enlightenment, and colonial spread. When you learn a word like "bureau" or "déjà vu" you're picking up a fossil from a specific moment in that history. English is full of French — you just don't see it until you start looking.

  The broader lesson: staying in learning mode keeps your thinking flexible. It's easy, especially in a technical career, to optimize around what you already know. Adding a new language, sport, or domain every few years is a forcing function against that calculus. The goal isn't fluency in everything — it's the practice of being a beginner again.
